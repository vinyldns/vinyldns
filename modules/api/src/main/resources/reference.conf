################################################################################################################
# The default configuration values for Vinyl
################################################################################################################
vinyldns {

  api {
      limits {
        batchchange-routing-max-items-limit = 100
        membership-routing-default-max-items = 100
        membership-routing-max-items-limit = 1000
        membership-routing-max-groups-list-limit = 1500
        recordset-routing-default-max-items = 100
        zone-routing-default-max-items = 100
        zone-routing-max-items-limit = 100
      }
    }

  valid-email-config {
    email-domains  = ["test.com","*dummy.com"]
    number-of-dots = 2
  }

  v6-discovery-nibble-boundaries {
    min = 5
    max = 20
  }

  dotted-hosts = {
    allowed-settings = [
      {
      # for wildcard zones. Settings will be applied to all matching zones
      zone = "*ent.com*."
      user-list = ["ok"]
      group-list = ["dummy-group"]
      record-types = ["CNAME"]
      dots-limit = 3
      },
      {
      # for wildcard zones. Settings will be applied to all matching zones
      zone = "dummy*."
      user-list = ["sharedZoneUser"]
      group-list = ["history-group1"]
      record-types = ["A"]
      dots-limit = 3
      }
    ]
  }

  manual-batch-review-enabled = true

  metrics {
    memory {
      log-enabled = false
      log-seconds = 0
    }
  }

  shared-approved-types = ["A", "AAAA", "CNAME", "PTR", "TXT"]

  rest {
    host = "0.0.0.0"
    port = 9000
  }

  backend {
    default-backend-id = "default"
    backend-providers: [{
      "class-name": "vinyldns.api.backend.dns.DnsBackendProviderLoader",
      "settings": {
        "legacy": false,
        backends = [
            {
              id = "default"
              zone-connection = {
                name = "vinyldns."
                key-name = "vinyldns."
                key = "nzisn+4G2ldMn0q1CV3vsg=="
                primary-server = "127.0.0.1:19001"
              }
              transfer-connection = {
                name = "vinyldns."
                key-name = "vinyldns."
                key = "nzisn+4G2ldMn0q1CV3vsg=="
                primary-server = "127.0.0.1:19001"
              },
              tsig-usage = "always"
            },
            {
              id = "func-test-backend"
              zone-connection = {
                name = "vinyldns."
                key-name = "vinyldns."
                key = "nzisn+4G2ldMn0q1CV3vsg=="
                primary-server = "127.0.0.1:19001"
              }
              transfer-connection = {
                name = "vinyldns."
                key-name = "vinyldns."
                key = "nzisn+4G2ldMn0q1CV3vsg=="
                primary-server = "127.0.0.1:19001"
              },
              tsig-usage = "always"
            }
          ]
      }
    }]

  }

  queue {
    max-retries       = 100
    messages-per-poll = 10
    polling-interval  = 250.millis
  }

  # These configs are not refers the application. It needed for tests.
  health-check-timeout = 10000
  default-ttl = 7200
  max-zone-size = 60000
  sync-delay = 600000
  approved-name-servers = [
      "172.17.42.1.",
      "ns1.parent.com."
    ]
  color = "green"
  load-test-data = false
  load-test-data = ${?LOAD_TEST_DATA}
  is-zone-sync-schedule-allowed = true
  is-zone-sync-schedule-allowed = ${?IS_ZONE_SYNC_SCHEDULE_ALLOWED}
}

akka {
  logger-startup-timeout = 30s
  http {
    server {
      bind-timeout = 5s
      verbose-error-messages = on
    }
  }
}