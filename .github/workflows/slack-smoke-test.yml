# .github/workflows/slack-smoke-test.yml
name: Slack Smoke Test

on:
  workflow_dispatch:

jobs:
  test-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Post test message to Slack
        id: slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Slack Smoke Test — SUCCESS\nRepo: ${{ github.repository }}\nRef: ${{ github.ref_name }} @ ${{ github.sha }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*Slack Smoke Test* — *SUCCESS* :white_check_mark:"
              - type: context
                elements:
                  - type: mrkdwn
                    text: "`${{ github.repository }}`  •  `${{ github.ref_name }}` @ `${{ github.sha }}`"
              - type: context
                elements:
                  - type: mrkdwn
                    text: "Trigger: `${{ github.event_name }}`  •  Actor: `${{ github.actor }}`  •  <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"

      - name: Log Slack API response
        if: always()
        run: |
          echo "slack ok: ${{ steps.slack.outputs.ok }}"
          echo "slack response: ${{ steps.slack.outputs.response }}"
