# .github/workflows/slack-smoke-test.yml
name: Slack Smoke Test

on:
  workflow_dispatch:

jobs:
  test-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Compute display variables
        id: vars
        shell: bash
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "run_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
          echo "repo_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "actor_url=${GITHUB_SERVER_URL}/${GITHUB_ACTOR}" >> "$GITHUB_OUTPUT"
          echo "ref_url=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/tree/${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Post test message to Slack
        id: slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Verify and Test — SUCCESS\nRepo: ${{ github.repository }}\nRef: ${{ github.ref_name }} @ ${{ steps.vars.outputs.sha_short }}\nRun: ${{ steps.vars.outputs.run_url }}"
            blocks:
              - type: header
                text:
                  type: plain_text
                  text: Verify and Test — SUCCESS
              - type: context
                elements:
                  - type: mrkdwn
                    text: "*Repo:* <${{ steps.vars.outputs.repo_url }}|${{ github.repository }}>"
                  - type: mrkdwn
                    text: "*Default:* main"
                  - type: mrkdwn
                    text: "*Trigger:* `${{ github.event_name }}`"
                  - type: mrkdwn
                    text: "*Actor:* <${{ steps.vars.outputs.actor_url }}|${{ github.actor }}>"
              - type: section
                fields:
                  - type: mrkdwn
                    text: |
                      *Ref:*
                      <${{ steps.vars.outputs.ref_url }}|${{ github.ref_name }}>
                  - type: mrkdwn
                    text: |
                      *SHA:*
                      `${{ steps.vars.outputs.sha_short }}`
              - type: actions
                elements:
                  - type: button
                    text:
                      type: plain_text
                      text: Run
                    url: ${{ steps.vars.outputs.run_url }}

      - name: Log Slack API response
        if: always()
        run: |
          echo "slack ok: ${{ steps.slack.outputs.ok }}"
          echo "slack response: ${{ steps.slack.outputs.response }}"
