name: Notify on Workflow Complete

on:
  workflow_run:
    workflows: [Verify and Test, VinylDNS Official Release]
    types:
      - completed
  workflow_dispatch:
    inputs:
      run-id:
        description: "Workflow run id to summarize (e.g. from /actions/runs/<id>)"
        required: true
      repo:
        description: "Repository to fetch run from (e.g. vinyldns/vinyldns). Defaults to current repo."
        required: false

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    steps:
      - name: Compose Slack message payload
        id: compose
        uses: actions/github-script@v7
        env:
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
        with:
          script: |
            const repo = context.payload.repository;
            let wr = context.payload.workflow_run;
            let workflowName =
              context.payload.workflow?.name ||
              wr?.name ||
              context.payload.workflow_run?.name ||
              "Workflow";

            // Target repo for API calls (can be overridden via workflow_dispatch input)
            let targetOwner = repo.owner.login;
            let targetRepoName = repo.name;

            if (context.eventName === "workflow_dispatch") {
              const runIdRaw = context.payload.inputs?.["run-id"] ?? "";
              const runId = Number(runIdRaw);
              if (!Number.isFinite(runId)) {
                throw new Error(`Invalid run-id input: "${runIdRaw}"`);
              }

              // Allow overriding repo for testing (e.g. "vinyldns/vinyldns")
              const repoInput = context.payload.inputs?.repo || "";
              if (repoInput && repoInput.includes("/")) {
                [targetOwner, targetRepoName] = repoInput.split("/");
              }

              const run = await github.rest.actions.getWorkflowRun({
                owner: targetOwner,
                repo: targetRepoName,
                run_id: runId
              });
              wr = run.data;

              const wf = await github.rest.actions.getWorkflow({
                owner: targetOwner,
                repo: targetRepoName,
                workflow_id: wr.workflow_id
              });
              workflowName = wf.data.name || workflowName;
            }

            const repoFull = wr.repository?.full_name || `${targetOwner}/${targetRepoName}`;
            const defaultBranch = repo.default_branch;
            const isDefault =
              wr.head_repository?.full_name === repoFull &&
              wr.head_branch === defaultBranch;

            const status = (wr.conclusion || "unknown").toUpperCase();
            const trigger = wr.event || "unknown";
            const actor =
              wr.actor?.login ||
              wr.actor?.name ||
              wr.triggering_actor?.login ||
              "unknown";

            const headRepo = wr.head_repository?.full_name || repoFull;
            const headBranch = wr.head_branch || "unknown";
            const headShaShort = (wr.head_sha || "").slice(0, 7) || "unknown";

            let prLine = "";
            let prUrl = "";
            let prNumber = undefined;
            let prTitle = "";
            let prBase = "";
            if (Array.isArray(wr.pull_requests) && wr.pull_requests.length > 0) {
              prNumber = wr.pull_requests[0]?.number;
              if (prNumber) {
                const pr = await github.rest.pulls.get({
                  owner: targetOwner,
                  repo: targetRepoName,
                  pull_number: prNumber
                });
                prTitle = pr.data.title || "";
                prBase = pr.data.base?.ref || "unknown";
                prUrl = pr.data.html_url || "";
                prLine = `PR: #${prNumber} "${prTitle}" → base: ${prBase}`;
              }
            }

            let failedLine = "";
            if (wr.conclusion !== "success") {
              const jobs = await github.rest.actions.listJobsForWorkflowRun({
                owner: targetOwner,
                repo: targetRepoName,
                run_id: wr.id
              });

              const failedJob =
                jobs.data.jobs.find(j => j.conclusion === "failure") ||
                jobs.data.jobs.find(j => j.conclusion && j.conclusion !== "success");

              if (failedJob) {
                const failedStep = Array.isArray(failedJob.steps)
                  ? failedJob.steps.find(s => s.conclusion === "failure")
                  : undefined;
                failedLine = failedStep
                  ? `Failed in job \`${failedJob.name}\` at step \`${failedStep.name}\``
                  : `Failed in job \`${failedJob.name}\``;
              }
            }

            let releaseLine = "";
            let releaseTag = "";
            let releaseUrl = "";
            if (workflowName === "VinylDNS Official Release") {
              try {
                const versionFile = await github.rest.repos.getContent({
                  owner: targetOwner,
                  repo: targetRepoName,
                  path: "version.sbt",
                  ref: wr.head_sha
                });
                if (!Array.isArray(versionFile.data) && versionFile.data.content) {
                  const versionSbt = Buffer.from(
                    versionFile.data.content,
                    "base64"
                  ).toString("utf8");
                  const match = versionSbt.match(/"([^"]+)"/);
                  if (match?.[1]) {
                    releaseTag = `v${match[1]}`;
                    releaseLine = `Release: ${releaseTag}`;

                    // If a GitHub Release exists for this tag, link to it (best-effort)
                    try {
                      const rel = await github.rest.repos.getReleaseByTag({
                        owner: targetOwner,
                        repo: targetRepoName,
                        tag: releaseTag
                      });
                      releaseUrl = rel.data.html_url || "";
                    } catch (e) {
                      // no-op: release may not exist yet
                    }
                  }
                }
              } catch (e) {
                // no-op: keep releaseLine empty if we can't read version.sbt
              }
            }

            const runUrl = wr.html_url;

            // Status emoji
            const statusEmoji = status === "SUCCESS" ? ":white_check_mark:" : ":x:";

            // Title text (shown above attachment, with emoji, bold)
            const titleText = `${statusEmoji} *${workflowName} — ${status}*`;

            // Build compact blocks (no title block - that's the top-level text now)
            const blocks = [];

            // Block 1 (optional): Failure info - right after title for visibility
            if (failedLine) {
              blocks.push({
                type: "section",
                text: { type: "mrkdwn", text: `*${failedLine}*` }
              });
            }

            // Block 3: Repo + ref + sha
            const refLine = `\`${repoFull}\`  •  \`${headBranch}\` @ \`${headShaShort}\``;
            blocks.push({
              type: "context",
              elements: [{ type: "mrkdwn", text: refLine }]
            });

            // Block 4: Trigger + actor + PR info (if applicable) + release info (if applicable)
            const infoBits = [`Trigger: \`${trigger}\``, `Actor: \`${actor}\``];
            if (prNumber && prTitle) {
              // Avoid # to prevent Slack channel parsing
              infoBits.push(`PR \`${prNumber} - ${prTitle}\` → \`${prBase}\``);
            }
            if (releaseTag) {
              const releaseText = releaseUrl ? `<${releaseUrl}|${releaseTag}>` : `\`${releaseTag}\``;
              infoBits.push(`Release: ${releaseText}`);
            }
            blocks.push({
              type: "context",
              elements: [{ type: "mrkdwn", text: infoBits.join("  •  ") }]
            });

            // Block 5: Action buttons
            const actions = [
              { type: "button", text: { type: "plain_text", text: "View Run →" }, url: runUrl }
            ];
            if (prUrl) {
              actions.push({ type: "button", text: { type: "plain_text", text: "View PR →" }, url: prUrl });
            }
            if (releaseUrl) {
              actions.push({ type: "button", text: { type: "plain_text", text: "View Release →" }, url: releaseUrl });
            }
            blocks.push({ type: "actions", elements: actions });

            // Use attachment with colored sidebar for visual grouping
            const attachmentColor = status === "SUCCESS" ? "#36a64f" : "#dc3545";

            const payload = {
              channel: process.env.SLACK_CHANNEL_ID,
              text: titleText,
              attachments: [{
                color: attachmentColor,
                blocks
              }]
            };

            return payload;

      - name: Send Slack Notification
        id: slack
        uses: slackapi/slack-github-action@v2.1.1
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: ${{ steps.compose.outputs.result }}

      - name: Log Slack API response
        if: always()
        run: |
          echo "slack ok: ${{ steps.slack.outputs.ok }}"
          echo "slack response: ${{ steps.slack.outputs.response }}"
