################################################################################################################
# This configuration is only used by docker and the build process
################################################################################################################
vinyldns {
  # ─── Bootstrap-only ──────────────────────────────────────────────────────────
  # These are the ONLY values that must be in this file.
  # Everything else is stored in the app_config DB table and read from there at runtime.

  # ─── SQS (bootstrap) ─────────────────────────────────────────────────────────
  queue {
    class-name = "vinyldns.sqs.queue.SqsMessageQueueProvider"
    class-name = ${?SQS_CLASS_NAME}
    settings {
      access-key = "test"
      access-key = ${?AWS_ACCESS_KEY}
      secret-key = "test"
      secret-key = ${?AWS_SECRET_ACCESS_KEY}
      signing-region = "us-east-1"
      signing-region = ${?SQS_REGION}
      service-endpoint = "http://localhost:19003/"
      service-endpoint = ${?SQS_SERVICE_ENDPOINT}
      queue-name = "vinyldns"
      queue-name = ${?SQS_QUEUE_NAME}
    }
  }

  # All connection settings come from DB.
  email {
    class-name = "vinyldns.api.notifier.email.EmailNotifierProvider"
    class-name = ${?EMAIL_CLASS_NAME}
    settings = {}
  }

  sns {
    class-name = "vinyldns.apadi.notifier.sns.SnsNotifierProvider"
    class-name = ${?SNS_CLASS_NAME}
    settings {
      topic-arn = "arn:aws:sns:us-east-1:000000000000:batchChanges"
      topic-arn = ${?SNS_TOPIC_ARN}
      access-key = "test"
      access-key = ${?SNS_ACCESS_KEY}
      secret-key = "test"
      secret-key = ${?SNS_SECRET_KEY}
      service-endpoint = "http://localhost:19003"
      service-endpoint = ${?SNS_SERVICE_ENDPOINT}
      signing-region = "us-east-1"
      signing-region = ${?SNS_SIGNING_REGION}
    }
  }

  # ─── Crypto (bootstrap) ──────────────────────────────────────────────────────
  crypto {
    type = "vinyldns.core.crypto.NoOpCrypto"
    type = ${?CRYPTO_TYPE}
    secret = ${?CRYPTO_SECRET}
  }

  # ─── MySQL (bootstrap) ───────────────────────────────────────────────────────
  data-stores = ["mysql"]
  mysql {
    settings {
      name = "vinyldns"
      name = ${?DATABASE_NAME}
      driver = "org.mariadb.jdbc.Driver"
      driver = ${?JDBC_DRIVER}
      migration-url = "jdbc:mariadb://localhost:19002/?user=root&password=pass&useMysqlMetadata=true"
      migration-url = ${?JDBC_MIGRATION_URL}
      url = "jdbc:mariadb://localhost:19002/vinyldns?user=root&password=pass&useMysqlMetadata=true"
      url = ${?JDBC_URL}
      user = "root"
      user = ${?JDBC_USER}
      password = "pass"
      password = ${?JDBC_PASSWORD}
      flyway-out-of-order = false
      flyway-out-of-order = ${?FLYWAY_OUT_OF_ORDER}
      max-lifetime = 300000
      connection-timeout-millis = 30000
      idle-timeout = 150000
      maximum-pool-size = 20
      minimum-idle = 5
    }
  }
}

akka {
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"
  logger-startup-timeout = 30s
  actor {
    provider = "akka.actor.LocalActorRefProvider"
  }
}

akka.http {
  server {
    bind-timeout = 5s
    verbose-error-messages = on
  }
  parsing {
    ignore-illegal-header-for = ["authorization"]
  }
}

include "local.conf"
