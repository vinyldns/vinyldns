################################################################################################################
# This configuration is only used by docker and the build process
################################################################################################################
vinyldns {

  base-version = "0.0.0-local-dev"
  version = ${vinyldns.base-version}
  version = ${?VINYLDNS_VERSION}

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend {
    default-backend-id = "default"

    backend-providers = [
      {
        class-name = "vinyldns.api.backend.dns.DnsBackendProviderLoader"
        settings = {
          legacy = false
          backends = [
            {
              id = "default"
              zone-connection = ${vinyldns.defaultZoneConnection}
              transfer-connection = ${vinyldns.defaultTransferConnection}
              tsig-usage = "always"
            },
            {
              id = "func-test-backend"
              zone-connection = ${vinyldns.defaultZoneConnection}
              transfer-connection = ${vinyldns.defaultTransferConnection}
              tsig-usage = "always"
            }
          ]
        }
      }
    ]
  }

  # ─── Queue ──────────────────────────────────────────────────────────────────
  queue {
    class-name = "vinyldns.sqs.queue.SqsMessageQueueProvider"
    class-name = ${?SQS_CLASS_NAME}

    messages-per-poll = 10
    polling-interval = 250.millis
    max-retries = 100

    settings {
      access-key = "test"
      access-key = ${?AWS_ACCESS_KEY}

      secret-key = "test"
      secret-key = ${?AWS_SECRET_ACCESS_KEY}

      signing-region = "us-east-1"
      signing-region = ${?SQS_REGION}

      service-endpoint = "http://localhost:19003/"
      service-endpoint = ${?SQS_SERVICE_ENDPOINT}

      queue-name = "vinyldns"
      queue-name = ${?SQS_QUEUE_NAME}
    }
  }

  # ─── Email ──────────────────────────────────────────────────────────────────
  email {
    class-name = "vinyldns.api.notifier.email.EmailNotifierProvider"
    class-name = ${?EMAIL_CLASS_NAME}
    settings = {}
  }

  # ─── SNS ────────────────────────────────────────────────────────────────────
  sns {
    class-name = "vinyldns.api.notifier.sns.SnsNotifierProvider"
    class-name = ${?SNS_CLASS_NAME}

    settings {
      topic-arn = "arn:aws:sns:us-east-1:000000000000:batchChanges"
      topic-arn = ${?SNS_TOPIC_ARN}

      access-key = "test"
      access-key = ${?SNS_ACCESS_KEY}

      secret-key = "test"
      secret-key = ${?SNS_SECRET_KEY}

      service-endpoint = "http://localhost:19003"
      service-endpoint = ${?SNS_SERVICE_ENDPOINT}

      signing-region = "us-east-1"
      signing-region = ${?SNS_SIGNING_REGION}
    }
  }

  # ─── Crypto ─────────────────────────────────────────────────────────────────
  crypto {
    type = "vinyldns.core.crypto.NoOpCrypto"
    type = ${?CRYPTO_TYPE}
    secret = ${?CRYPTO_SECRET}
  }

  # ─── MySQL ──────────────────────────────────────────────────────────────────
  data-stores = ["mysql"]

  mysql {
    class-name = "vinyldns.mysql.repository.MySqlDataStoreProvider"

    repositories {
      user {}
      group {}
      membership {}
      group-change {}
      record-set {}
      record-change {}
      record-set-cache {}
      zone-change {}
      zone {}
      batch-change {}
      user-change {}
      task {}
      app-config {}
    }

    settings {
      name = "vinyldns"
      name = ${?DATABASE_NAME}

      driver = "org.mariadb.jdbc.Driver"
      driver = ${?JDBC_DRIVER}

      migration-url = "jdbc:mariadb://localhost:19002/?user=root&password=pass&useMysqlMetadata=true"
      migration-url = ${?JDBC_MIGRATION_URL}

      url = "jdbc:mariadb://localhost:19002/vinyldns?user=root&password=pass&useMysqlMetadata=true"
      url = ${?JDBC_URL}

      user = "root"
      user = ${?JDBC_USER}

      password = "pass"
      password = ${?JDBC_PASSWORD}

      flyway-out-of-order = false
      flyway-out-of-order = ${?FLYWAY_OUT_OF_ORDER}

      max-lifetime = 300000
      connection-timeout-millis = 30000
      idle-timeout = 150000
      maximum-pool-size = 20
      minimum-idle = 5
    }
  }

  # ─── Default DNS Connections ────────────────────────────────────────────────
  defaultZoneConnection {
    name = "vinyldns."
    name = ${?DEFAULT_DNS_KEY_NAME}

    key-name = "vinyldns."
    key-name = ${?DEFAULT_DNS_KEY_NAME}

    key = "nzisn+4G2ldMn0q1CV3vsg=="
    key = ${?DEFAULT_DNS_KEY_SECRET}

    primary-server = "127.0.0.1:19001"
    primary-server = ${?DEFAULT_DNS_ADDRESS}
  }

  defaultTransferConnection = ${vinyldns.defaultZoneConnection}

  # ─── Misc ───────────────────────────────────────────────────────────────────
  processing-disabled = false
  batch-change-limit = 1000
  shared-approved-types = ["A", "AAAA", "CNAME", "PTR", "TXT"]

  v6-discovery-nibble-boundaries {
    min = 5
    max = 20
  }

  rest {
    host = "127.0.0.1"
    port = 9000
  }
}

# ─── Akka ─────────────────────────────────────────────────────────────────────
akka {
  loglevel = "INFO"
  loggers = ["akka.event.slf4j.Slf4jLogger"]
  logging-filter = "akka.event.slf4j.Slf4jLoggingFilter"

  actor {
    provider = "akka.actor.LocalActorRefProvider"
  }
}

akka.http {
  server {
    bind-timeout = 5s
    verbose-error-messages = on
  }

  parsing {
    ignore-illegal-header-for = ["authorization"]
  }
}

include "local.conf"
